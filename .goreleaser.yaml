version: 2

project_name: notectl

before:
  hooks:
    - go mod tidy

builds:
  - main: .
    binary: notectl
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
    goarch:
      - arm64
      - amd64
    ldflags:
      - -s -w -X github.com/aeon022/notectl/cmd.Version={{ .Version }}

archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^chore:"
      - "^test:"

# Publishing to the Homebrew tap requires the HOMEBREW_TAP_TOKEN secret
# (fine-grained PAT with contents:write on aeon022/homebrew-tap).
brews:
  - repository:
      owner: aeon022
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: https://github.com/aeon022/notectl
    license: MIT
    description: "Notes from your terminal - write and read Obsidian vault notes"
    install: |
      bin.install "notectl"
    test: |
      system "#{bin}/notectl", "version"
